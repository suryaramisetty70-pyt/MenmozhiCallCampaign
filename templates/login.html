<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Menmozhi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700&display=swap');
:root { --bg-0:#020617; --cyan:#00e5ff; --violet:#8b5cf6; --text:#e6f4ff; --muted:#5a7a9e; --border:rgba(0,229,255,.15); --glass:rgba(12,28,58,.65); --glass-2:rgba(8,18,40,.75); --grad-aurora:linear-gradient(135deg,#00e5ff 0%,#8b5cf6 50%,#e879f9 100%); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; color:var(--text); min-height:100vh; background:var(--bg-0); display:grid; place-items:center; }
.bg-grid { position:fixed; inset:0; z-index:0; pointer-events:none; background-image: linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px); background-size:60px 60px; }
.auth-box { width:100%; max-width:400px; padding:40px; position:relative; z-index:1; background:linear-gradient(145deg,var(--glass),var(--glass-2)); backdrop-filter:blur(24px); border:1px solid var(--border); border-radius:24px; box-shadow:0 8px 32px rgba(0,0,0,.6); }
.brand { text-align:center; margin-bottom:30px; }
.logo-mark { width:60px; height:60px; margin:0 auto 16px; border-radius:16px; background:var(--grad-aurora); display:grid; place-items:center; box-shadow:0 0 24px rgba(0,229,255,.4); }
.brand h1 { font-family:'Orbitron',sans-serif; font-size:24px; }
.brand p { color:var(--muted); font-size:13px; margin-top:4px; }
.form-group { margin-bottom:20px; }
.form-group label { display:block; font-size:12px; color:var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
.form-group input { width:100%; padding:14px; border-radius:12px; background:rgba(0,0,0,.3); border:1px solid var(--border); color:#fff; font-family:'Inter',sans-serif; outline:none; transition:border .3s; }
.form-group input:focus { border-color:var(--cyan); box-shadow:0 0 10px rgba(0,229,255,.2); }
.btn { width:100%; padding:14px; border:none; border-radius:12px; cursor:pointer; font-family:'Orbitron',sans-serif; font-weight:700; font-size:14px; background:var(--grad-aurora); color:#000; transition:all .3s; box-shadow:0 4px 15px rgba(0,229,255,.3); margin-top:10px; }
.btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,229,255,.5); }
.toggle-text { text-align:center; font-size:13px; margin-top:20px; color:var(--muted); }
.toggle-text a { color:var(--cyan); font-weight:600; text-decoration:none; }
.alert { padding:12px; border-radius:8px; margin-bottom:20px; font-size:13px; text-align:center; }
.alert-danger { background:rgba(255,85,119,.1); border:1px solid #ff5577; color:#ff5577; }
.alert-success { background:rgba(16,255,176,.1); border:1px solid #10ffb0; color:#10ffb0; }
.alert-warning { background:rgba(255,193,7,.1); border:1px solid #ffc107; color:#ffc107; }
.alert-info { background:rgba(0,229,255,.1); border:1px solid var(--cyan); color:var(--cyan); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="auth-box">
  <div class="brand">
    <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" style="width:30px;height:30px;"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
    <h1>MENMOZHI</h1>
    <p>Secure Command Center</p>
  </div>
  {% for category, message in get_flashed_messages(request) %}
  <div class="alert alert-{{ category }}">{{ message }}</div>
  {% endfor %}
  <form action="/login" method="POST">
    <div class="form-group"><label>Email or Username</label><input type="text" name="username_or_email" placeholder="admin@example.com" required></div>
    <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
    <button type="submit" class="btn">Authenticate</button>
  </form>
  <div class="toggle-text"><a href="/forgot-password">Forgot password?</a></div>
  <div class="toggle-text">Don't have an account? <a href="/signup">Sign up</a></div>
</div>
</body>
</html>
